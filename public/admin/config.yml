local_backend: true

backend:
  name: git-gateway
  branch: main

media_folder: public/images
public_folder: /images

collections:
  - name: pages
    label: Pages
    files:
      - name: homepage
        label: Homepage
        file: src/data/homepage.json
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Subtitle, name: subtitle, widget: richtext }
          - { label: About, name: about, widget: markdown }
          - label: Featured Work
            name: featured_work
            widget: list
            field: { label: Portfolio Slug, name: slug, widget: string, hint: "e.g. project-one" }
          - label: Tech Icons
            name: icons
            widget: list
            field: { label: Tech Name, name: icon, widget: string, hint: "e.g. csharp, azure, kubernetes" }
      - name: footer
        label: Footer
        file: src/data/footer.json
        fields:
          - { label: Owner Name, name: owner_name, widget: string }
          - { label: Copyright Suffix, name: copyright_suffix, widget: string, required: false }
          - { label: Tagline, name: tagline, widget: string, required: false }
          - label: Social Links
            name: social_links
            widget: list
            fields:
              - { label: Label, name: label, widget: string }
              - { label: URL, name: url, widget: string, hint: "e.g. https://github.com/username" }
              - { label: Icon Class, name: icon, widget: string, required: false, hint: "Bootstrap Icon class, e.g. bi-github" }
      - name: devicons
        label: Dev Icons
        file: src/data/devicons.json
        fields:
          - label: SVG Icon Overrides
            name: icons
            widget: list
            summary: "{{fields.key}}"
            fields:
              - label: Tech Name
                name: key
                widget: select
                options:
                  - csharp
                  - svelte
                  - microsoftsqlserver
                  - kubernetes
                  - azure
                  - netlify
              - label: SVG Markup
                name: svg
                widget: text
                hint: "Paste raw SVG markup. Leave blank to keep using the CDN devicon class."
                required: false
      - name: empty_states
        label: Empty States
        file: src/data/empty-states.json
        fields:
          - { label: Homepage Latest Posts Empty Message, name: home_latest_posts_empty, widget: string }
          - { label: Homepage Featured Work Empty Message, name: home_featured_work_empty, widget: string }
          - { label: Blog Index Empty Message, name: blog_index_empty, widget: string }
          - { label: Portfolio Index Empty Message, name: portfolio_index_empty, widget: string }

  - name: blog
    label: Blog
    folder: src/content/blog
    create: true
    slug: "{{slug}}"
    extension: md
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime, date_format: YYYY-MM-DD, time_format: false }
      - { label: Description, name: description, widget: string }
      - label: Categories
        name: categories
        widget: list
        required: false
        hint: "Maximum 3 categories"
      - { label: Body, name: body, widget: richtext }

  - name: portfolio
    label: Portfolio
    folder: src/content/portfolio
    create: true
    slug: "{{slug}}"
    extension: md
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: string }
      - label: Tags
        name: tags
        widget: list
        required: false
        hint: "Maximum 3 tags"
      - { label: Body, name: body, widget: richtext }
