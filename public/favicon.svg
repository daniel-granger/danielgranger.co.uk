<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="DG favicon">
    <defs>
        <linearGradient id="dgGradient" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#FFFFFF" />
            <stop offset="100%" stop-color="#E9FFF4" />
        </linearGradient>
        <filter id="dgShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="2" stdDeviation="1.2" flood-color="#1F6B43" flood-opacity="0.45" />
        </filter>
    </defs>
    <rect x="8" y="8" width="112" height="112" rx="24" fill="#6CD899" />
    <text
        x="64"
        y="85"
        text-anchor="middle"
        font-size="62"
        font-family="Arial Black, Arial, Helvetica, sans-serif"
        font-weight="800"
        letter-spacing="-2"
        fill="url(#dgGradient)"
        stroke="#1F6B43"
        stroke-width="1.5"
        filter="url(#dgShadow)"
    >
        DG
    </text>
</svg>
